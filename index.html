<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมเรียงแถว 1-50 (P2P Version)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap');
        body { font-family: 'Kanit', sans-serif; background: linear-gradient(135deg, #111827 0%, #312e81 100%); }
    </style>
</head>
<body class="text-white min-h-screen p-4 flex flex-col items-center">

    <div class="w-full max-w-4xl bg-white/10 backdrop-blur-md rounded-2xl p-6 shadow-2xl border border-white/20">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-yellow-300 drop-shadow">🎲 เกมเรียงแถว 50 ไป 1 (ไม่ต้องง้อฐานข้อมูล) 🎯</h1>
        </div>

        <div id="lobby-screen" class="space-y-6 max-w-md mx-auto bg-gray-800/80 p-6 rounded-xl border border-gray-700">
            <div>
                <label class="block text-sm mb-1">1. ชื่อของคุณ:</label>
                <input type="text" id="username-input" class="w-full p-2 rounded bg-gray-700 text-white border border-gray-600" placeholder="ใส่ชื่อเล่น...">
            </div>
            
            <div class="border-t border-gray-700 pt-4 grid grid-cols-2 gap-4">
                <button onclick="initAsHost()" class="bg-green-500 hover:bg-green-600 text-white font-bold p-3 rounded-xl">👑 สร้างห้องใหม่</button>
                <div class="space-y-2">
                    <input type="text" id="room-id-input" class="w-full p-2 rounded bg-gray-700 text-white text-center border border-gray-600 text-sm" placeholder="ใส่รหัสห้องของเพื่อน...">
                    <button onclick="initAsGuest()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold p-2 rounded-xl text-sm">🚪 เข้าห้องเพื่อน</button>
                </div>
            </div>
            <div id="status-msg" class="text-center text-xs text-yellow-400"></div>
        </div>

        <div id="game-screen" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-gray-900/60 p-4 rounded-xl border border-white/10">
                <h2 class="text-xl font-bold text-yellow-300 mb-3 flex justify-between">
                    <span>👥 สมาชิกในห้อง</span>
                    <span id="role-tag" class="text-xs bg-gray-700 px-2 py-1 rounded text-gray-300"></span>
                </h2>
                <div id="room-id-display" class="bg-black/30 p-2 rounded mb-3 text-center text-xs text-green-400 select-all font-mono hidden">
                    คัดลอกรหัสนี้ให้เพื่อน: <span id="my-room-id" class="font-bold text-sm block"></span>
                </div>
                <div id="players-list" class="space-y-2"></div>
                
                <div class="mt-6 pt-4 border-t border-white/10 text-center">
                    <button id="start-btn" onclick="hostStartGame()" class="hidden w-full bg-green-500 hover:bg-green-600 text-white font-bold p-3 rounded-xl shadow-lg">🎲 เริ่มเกม & แจกเลข</button>
                    <button id="reveal-btn" onclick="hostRevealResults()" class="hidden w-full bg-red-500 hover:bg-red-600 text-white font-bold p-3 rounded-xl shadow-lg mt-2">👁️ เฉลยผลลัพธ์</button>
                </div>
            </div>

            <div class="md:col-span-2 space-y-4">
                <div class="bg-yellow-400 text-gray-900 p-4 rounded-xl text-center shadow-lg">
                    <span class="text-xs uppercase font-bold tracking-wider opacity-70">📋 หัวข้อรอบนี้</span>
                    <h2 id="topic-display" class="text-xl font-bold mt-1">รอหัวหน้าห้องเริ่มเกม...</h2>
                </div>

                <div class="bg-purple-900/60 p-4 rounded-xl text-center border border-purple-400/30">
                    <span class="text-sm text-purple-200 block">🔢 เลขลับของคุณ</span>
                    <div id="my-number" class="text-5xl font-bold text-yellow-300 my-2">-</div>
                </div>

                <div class="bg-gray-800/40 p-4 rounded-xl">
                    <label class="block text-sm mb-2 text-gray-300">💬 พิมพ์คำใบ้ของคุณ:</label>
                    <div class="flex gap-2">
                        <input type="text" id="clue-input" class="flex-1 p-2 rounded bg-gray-700 border border-gray-600 text-white" placeholder="พิมพ์คำใบ้เสร็จแล้วกดส่ง...">
                        <button onclick="submitClue()" class="bg-blue-500 hover:bg-blue-600 px-4 rounded font-bold">ส่ง</button>
                    </div>
                </div>

                <div class="bg-gray-900/50 p-4 rounded-xl">
                    <h3 class="text-sm font-bold text-gray-300 mb-2">🤝 ช่วยกันลากเรียงลำดับ (50 ไป 1)</h3>
                    <div id="sortable-container" class="flex flex-wrap gap-2 min-h-[60px] p-2 bg-black/20 rounded-lg"></div>
                    <p id="drag-tip" class="text-xs text-right text-gray-400 mt-1">เฉพาะหัวหน้าห้องที่ลากจัดลำดับได้</p>
                </div>

                <div id="score-result" class="hidden bg-green-600/80 p-4 rounded-xl text-center"></div>
            </div>
        </div>
    </div>

    <script>
        const topics = [
            "ขนาดพื้นที่ประเทศ (1 = ใหญ่สุดรัสเซีย, 50 = เล็กสุดวาติกัน)",
            "ความร่ำรวยของเงินในบัญชี (1 = มหาเศรษฐีดูไบ, 50 = แกลบยังไม่มีจะกิน)",
            "ระดับความน่ากลัวถ้าเจอสิ่งนี้ในห้องน้ำตอนตี 3 (1 = ผีกระสือ, 50 = ยุง 1 ตัว)",
            "ระดับความอร่อยของ 'กะเพราใส่ถั่วฝักยาว' (1 = อร่อยแสงออกปาก, 50 = ผิดศีลธรรมเฉดหัวทิ้ง)",
            "ระดับความโชคดีในชีวิต (1 = ถูกรางวัลที่ 1 สิบงวดติด, 50 = เดินเหยียบขี้หมาแล้วสะดุดล้ม)",
            "ระดับความหล่อ/สวย ของตัวคุณเองในวันนี้ (1 = ดาราระดับฮอลลีวูด, 50 = น้ำยังไม่อาบ)"
        ];

        let peer = null;
        let connections = []; // สำหรับ Host เก็บการเชื่อมต่อของทุกคน
        let connToHost = null; // สำหรับ Guest เก็บการเชื่อมต่อวิ่งไปหา Host
        
        let isHost = false;
        let myName = "";
        let myId = "";
        
        // Game State (แชร์กัน)
        let gameState = {
            status: "lobby",
            topic: "",
            players: {}, // key: id, value: {id, name, clue, number, score}
            clueOrder: [],
            roundResult: null
        };

        function showStatus(txt) { document.getElementById("status-msg").innerText = txt; }

        function enterGameUi(role) {
            document.getElementById("lobby-screen").classList.add("hidden");
            document.getElementById("game-screen").classList.remove("hidden");
            document.getElementById("role-tag").innerText = role;
        }

        // --- ส่วนของ 👑 HOST (คนสร้างห้อง) ---
        function initAsHost() {
            myName = document.getElementById("username-input").value.trim();
            if (!myName) return alert("ใส่ชื่อก่อนจ้า");
            isHost = true;
            myId = "host_" + Math.random().toString(36).substr(2, 4);

            showStatus("กำลังสร้างห้องพักครู่...");
            peer = new Peer(); // ระบบจะสุ่ม ID ห้องฟรีจากคลาวด์สาธารณะให้

            peer.on('open', (id) => {
                enterGameUi("👑 หัวหน้าห้อง");
                document.getElementById("room-id-display").classList.remove("hidden");
                document.getElementById("my-room-id").innerText = id;
                document.getElementById("start-btn").classList.remove("hidden");
                document.getElementById("drag-tip").innerText = "*หัวหน้าห้องสามารถลากสลับตำแหน่งได้คนเดียวเพื่อความเสถียร*";

                // เพิ่มตัวเองในเกม
                gameState.players[myId] = { id: myId, name: myName, clue: "ยังไม่ได้ใบ้", number: 0, score: 0 };
                gameState.clueOrder.push(myId);
                updateUi();
            });

            // รอคนจอยเข้ามา
            peer.on('connection', (conn) => {
                connections.push(conn);
                conn.on('data', (data) => {
                    handleIncomingData(data, conn);
                });
                
                // ส่งสเตตัสปัจจุบันให้คนที่เพิ่งเข้า
                setTimeout(() => { broadcastState(); }, 500);
            });
        }

        // --- ส่วนของ 🚪 GUEST (คนจอยห้องเพื่อน) ---
        function initAsGuest() {
            myName = document.getElementById("username-input").value.trim();
            let targetRoomId = document.getElementById("room-id-input").value.trim();
            if (!myName || !targetRoomId) return alert("กรุณากรอกทั้งชื่อและรหัสห้องของเพื่อนครับ");
            
            isHost = false;
            myId = "guest_" + Math.random().toString(36).substr(2, 4);

            showStatus("กำลังเชื่อมต่อไปยังห้องเพื่อน...");
            peer = new Peer();

            peer.on('open', (id) => {
                connToHost = peer.connect(targetRoomId);
                
                connToHost.on('open', () => {
                    enterGameUi("👥 ผู้เล่น");
                    // ส่งข้อมูลตัวเองให้ Host รู้จัก
                    connToHost.send({ type: "JOIN", player: { id: myId, name: myName, clue: "ยังไม่ได้ใบ้", number: 0, score: 0 } });
                });

                connToHost.on('data', (data) => {
                    if (data.type === "SYNC") {
                        gameState = data.state;
                        updateUi();
                    }
                });
            });
        }

        // --- ระบบสื่อสารข้อมูล ---
        function handleIncomingData(data, conn) {
            if (!isHost) return;
            
            if (data.type === "JOIN") {
                gameState.players[data.player.id] = data.player;
                if (!gameState.clueOrder.includes(data.player.id)) {
                    gameState.clueOrder.push(data.player.id);
                }
            } else if (data.type === "SUBMIT_CLUE") {
                if (gameState.players[data.id]) {
                    gameState.players[data.id].clue = data.clue;
                }
            }
            broadcastState();
        }

        function broadcastState() {
            if (!isHost) return;
            connections.forEach(conn => {
                conn.send({ type: "SYNC", state: gameState });
            });
            updateUi();
        }

        function submitClue() {
            const txt = document.getElementById("clue-input").value.trim();
            if (!txt) return;
            if (isHost) {
                gameState.players[myId].clue = txt;
                broadcastState();
            } else {
                connToHost.send({ type: "SUBMIT_CLUE", id: myId, clue: txt });
            }
            document.getElementById("clue-input").value = "";
        }

        // --- ควบคุมการทำงานของเกม (เฉพาะ Host) ---
        function hostStartGame() {
            const ids = Object.keys(gameState.players);
            let numbers = [];
            while (numbers.length < ids.length) {
                let r = Math.floor(Math.random() * 50) + 1;
                if (!numbers.includes(r)) numbers.push(r);
            }
            ids.forEach((id, idx) => {
                gameState.players[id].number = numbers[idx];
                gameState.players[id].clue = "กำลังคิดคำใบ้...";
            });
            gameState.topic = topics[Math.floor(Math.random() * topics.length)];
            gameState.status = "playing";
            gameState.clueOrder = [...ids];
            gameState.roundResult = null;
            
            document.getElementById("reveal-btn").classList.remove("hidden");
            broadcastState();
        }

        function hostRevealResults() {
            const order = gameState.clueOrder;
            let score = 0;
            let numberSequence = order.map(id => gameState.players[id].number);
            let valid = true;
            let detailText = `ลำดับเลข: ${numberSequence.join(" ➔ ")} <br>`;
            
            for(let i = 0; i < numberSequence.length; i++) {
                if (i === 0) score++;
                else {
                    if (numberSequence[i] < numberSequence[i-1] && valid) score++;
                    else valid = false;
                }
            }

            Object.keys(gameState.players).forEach(id => {
                gameState.players[id].score += score;
            });

            gameState.status = "reveal";
            gameState.roundResult = { score: score, detail: detailText + ` ได้คะแนนต่อเนื่องกัน ${score} ตแหน่ง!` };
            broadcastState();
        }

        // --- อัปเดตหน้าจอแชร์ร่วมกัน ---
        function updateUi() {
            // ดึงรายชื่อคนเล่น
            const pList = document.getElementById("players-list");
            pList.innerHTML = "";
            Object.values(gameState.players).forEach(p => {
                pList.innerHTML += `
                    <div class="flex justify-between bg-gray-800 p-2 rounded text-sm border border-gray-700">
                        <div><b>${p.name}</b> <div class="text-xs text-gray-400">ใบ้: ${p.clue}</div></div>
                        <div class="text-yellow-400 font-bold">🏆 ${p.score}</div>
                    </div>`;
            });

            // อัปเดตหัวข้อและเลขลับ
            document.getElementById("topic-display").innerText = gameState.topic || "รอหัวหน้าห้องกดเริ่ม...";
            if (gameState.players[myId]) {
                document.getElementById("my-number").innerText = gameState.players[myId].number || "-";
            }

            // แสดงสรุปผลคะแนน
            const sRes = document.getElementById("score-result");
            if (gameState.status === "reveal" && gameState.roundResult) {
                sRes.classList.remove("hidden");
                sRes.innerHTML = `<h3 class="font-bold">🎉 ผลลัพธ์รอบนี้ 🎉</h3><p class="text-xl font-bold">+${gameState.roundResult.score} คะแนน!</p><p class="text-xs">${gameState.roundResult.detail}</p>`;
            } else {
                sRes.classList.add("hidden");
            }

            renderSortableCards();
        }

        function renderSortableCards() {
            const container = document.getElementById("sortable-container");
            container.innerHTML = "";
            const isReveal = (gameState.status === "reveal");

            gameState.clueOrder.forEach((id, index) => {
                const p = gameState.players[id];
                if (!p) return;

                const card = document.createElement("div");
                card.className = `p-3 rounded-lg text-gray-900 font-bold shadow flex flex-col items-center justify-center min-w-[120px] text-sm bg-yellow-100 ${(!isReveal && isHost) ? 'cursor-move' : ''}`;
                
                if (!isReveal && isHost) {
                    card.draggable = true;
                    card.addEventListener('dragstart', (e) => e.dataTransfer.setData("text", index));
                    card.addEventListener('dragover', (e) => e.preventDefault());
                    card.addEventListener('drop', (e) => {
                        e.preventDefault();
                        const oldIdx = e.dataTransfer.getData("text");
                        let newOrder = [...gameState.clueOrder];
                        const [removed] = newOrder.splice(oldIdx, 1);
                        newOrder.splice(index, 0, removed);
                        gameState.clueOrder = newOrder;
                        broadcastState();
                    });
                }

                let numDisplay = isReveal ? `<span class="text-purple-700 text-xs block">🔢 เลข: ${p.number}</span>` : "";
                card.innerHTML = `<span class="text-xs text-gray-500">${p.name}</span><span>"${p.clue}"</span>${numDisplay}`;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
